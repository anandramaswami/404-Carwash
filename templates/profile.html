{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section" style="padding-top: 12rem;">
    <div class="container" style="max-width: 1000px;">
        <div class="glass-card reveal animate-up" style="padding: 6rem; border-radius: 40px;">
            <div style="display: flex; align-items: center; gap: 4rem; margin-bottom: 6rem; border-bottom: 1px solid var(--border-glass); padding-bottom: 6rem;">
                <div class="profile-avatar-large">
                    {{ user.username|first|upper }}
                </div>
                <div style="flex-grow: 1;">
                    <span class="hero-badge" style="margin-bottom: 1.5rem;">Member Account</span>
                    <h1 style="font-size: 3.5rem; color: #fff; margin-bottom: 0.5rem; letter-spacing: -1px;">{{ user.username }}</h1>
                    <p style="color: var(--text-muted); font-size: 1.15rem;">Platinum membership active since 2026.</p>
                </div>
                <div>
                    <div style="background: rgba(212, 175, 55, 0.1); border: 1px solid var(--border-glass); padding: 1.5rem; border-radius: 20px; text-align: center;">
                        <div style="color: var(--primary); font-size: 1.8rem; font-weight: 800; margin-bottom: 0.2rem;">Elite</div>
                        <span style="color: #fff; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 2px;">Tier Level</span>
                    </div>
                </div>
            </div>

            <form method="POST" action="{% url 'profile' %}">
                {% csrf_token %}
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; margin-bottom: 3rem;">
                    <div class="form-group">
                        <label style="display: block; color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 1.2rem;">Alias (Upper Case)</label>
                        <div style="position: relative;">
                            <i class="fas fa-id-card" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem;"></i>
                            <input type="text" name="username" style="width: 100%; padding: 1.2rem 1.2rem 1.2rem 4rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); border-radius: 12px; color: #fff; outline: none; transition: var(--transition-smooth); text-transform: uppercase;" value="{{ user.username }}" pattern="[A-Z0-9\s]+" title="Username must be in FULL UPPER CASE" required onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-glass)'">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label style="display: block; color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 1.2rem;">Digital Communication</label>
                        <div style="position: relative;">
                            <i class="fas fa-envelope" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem;"></i>
                            <input type="email" name="email" style="width: 100%; padding: 1.2rem 1.2rem 1.2rem 4rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); border-radius: 12px; color: #fff; outline: none; transition: var(--transition-smooth);" value="{{ user.email }}" required onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-glass)'">
                        </div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; margin-bottom: 3rem;">
                    <div class="form-group">
                        <label style="display: block; color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 1.2rem;">Encrypted Contact</label>
                        <div style="position: relative;">
                            <i class="fas fa-phone-alt" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem;"></i>
                            <input type="text" name="contact" style="width: 100%; padding: 1.2rem 1.2rem 1.2rem 4rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); border-radius: 12px; color: #fff; outline: none; transition: var(--transition-smooth);" value="{{ customer.contact }}" required maxlength="10" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-glass)'">
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="display: block; color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 1.2rem;">Wallet PIN (4 Digits)</label>
                        <div style="position: relative;">
                            <i class="fas fa-lock" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem;"></i>
                            <input type="text" name="payment_pin" style="width: 100%; padding: 1.2rem 1.2rem 1.2rem 4rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); border-radius: 12px; color: #fff; outline: none; transition: var(--transition-smooth); letter-spacing: 5px; font-weight: bold;" value="{{ customer.payment_pin }}" required pattern="\d{4}" maxlength="4" title="Must be exactly 4 digits" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-glass)'">
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 3rem;">
                    <label style="display: block; color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 1.2rem;">Reference Key</label>
                    <div style="position: relative;">
                        <i class="fas fa-fingerprint" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem;"></i>
                        <input type="text" style="width: 100%; padding: 1.2rem 1.2rem 1.2rem 4rem; background: rgba(255,255,255,0.01); border: 1px solid var(--border-glass); border-radius: 12px; color: var(--text-muted); outline: none; cursor: not-allowed;" value="{{ customer.customer_id }}" readonly>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 5rem;">
                    <label style="display: block; color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 1.2rem;">Residence Address</label>
                    <div style="position: relative;">
                        <i class="fas fa-map-marker-alt" style="position: absolute; left: 1.5rem; top: 1.5rem; color: var(--primary); font-size: 1.2rem;"></i>
                        <textarea name="address" style="width: 100%; padding: 1.2rem 1.2rem 1.2rem 4rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); border-radius: 12px; color: #fff; outline: none; transition: var(--transition-smooth); min-height: 120px; resize: none;" required onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-glass)'">{{ customer.address }}</textarea>
                    </div>
                </div>

                <div style="margin-top: 6rem; border-top: 1px solid var(--border-glass); padding-top: 5rem;">
                    <h3 style="color: #fff; margin-bottom: 3rem; font-size: 1.8rem; letter-spacing: -1px;">Security Protocol</h3>
                    <div class="form-group" style="max-width: 500px;">
                        <label style="display: block; color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 1.2rem;">Update Security Key (Leave blank to keep baseline)</label>
                        <div style="position: relative;">
                            <i class="fas fa-key" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem;"></i>
                            <input type="password" name="password" style="width: 100%; padding: 1.2rem 1.2rem 1.2rem 4rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); border-radius: 12px; color: #fff; outline: none; transition: var(--transition-smooth);" placeholder="••••••••" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-glass)'">
                        </div>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 2rem; margin-top: 6rem;">
                    <a href="{% url 'home' %}" class="btn btn-outline" style="padding: 1.1rem 3rem; font-size: 0.9rem; border-radius: 12px; border: 1px solid var(--border-glass);">Return to Sanctuary</a>
                    <button type="submit" class="btn btn-primary" style="padding: 1.1rem 4rem; font-size: 0.9rem; border-radius: 12px;">
                        COMMIT DISK UPDATES <i class="fas fa-save" style="margin-left: 15px;"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

<style>
.profile-avatar-large {
    width: 160px;
    height: 160px;
    background: linear-gradient(135deg, var(--primary), #b08d29);
    border-radius: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    font-weight: 800;
    color: #000;
    box-shadow: 0 0 50px var(--primary-glow);
    border: 1px solid rgba(255,255,255,0.1);
    transition: var(--transition-smooth);
    transform: rotate(-3deg);
}

.profile-avatar-large:hover {
    transform: rotate(0deg) scale(1.05);
    box-shadow: 0 0 70px var(--primary-glow);
}
</style>
{% endblock %}
